<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اختبار يد التحكم - Gamepad Pro Tester</title>
  <style>
    /* ======================= أسلوب عام ديناميكي ======================= */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top left, #0f0f0f 0%, #1a1a1a 100%);
      color: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 20px;
      overflow-x: hidden;
      animation: backgroundShift 20s infinite alternate;
    }

    @keyframes backgroundShift {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    h1 {
      margin-bottom: 15px;
      color: #00ffff;
      text-shadow: 0 0 15px #00ffff, 0 0 25px #00ffff33;
      font-size: 36px;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      0% { text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff33; }
      100% { text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff55; }
    }

    /* ======================= معلومات اليد ======================= */
    #gamepad-info {
      text-align: center;
      margin-bottom: 20px;
      font-size: 17px;
      line-height: 1.5;
    }
    #gamepad-info span {
      font-weight: bold;
      color: #00ffcc;
      text-shadow: 0 0 5px #00ffcc88;
    }

    /* ======================= الأزرار ======================= */
    #buttons {
      display: grid;
      grid-template-columns: repeat(8, 70px);
      grid-gap: 12px;
      justify-content: center;
      margin-bottom: 25px;
      perspective: 800px;
    }

    .button {
      width: 70px;
      height: 70px;
      background-color: #222;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.1s all;
      font-weight: bold;
      color: #fff;
      user-select: none;
      box-shadow: 0 5px 15px rgba(0,0,0,0.7), 0 0 15px #00ffff22 inset;
      transform-style: preserve-3d;
    }

    .button.active {
      background: linear-gradient(145deg, #00ffcc, #00ffaa);
      transform: scale(1.2) rotateX(10deg) rotateY(10deg);
      box-shadow: 0 0 25px #00ffcc, 0 0 50px #00ffaa inset;
    }

    /* ======================= العصي التناظرية ======================= */
    #sticks {
      display: flex;
      justify-content: center;
      gap: 80px;
      margin-bottom: 25px;
    }

    .stick {
      width: 230px;
      height: 230px;
      background-color: #111;
      border-radius: 50%;
      position: relative;
      box-shadow: inset 0 0 20px rgba(0,255,255,0.2), 0 5px 15px rgba(0,0,0,0.7);
      transition: 0.1s;
    }

    .stick-dot {
      width: 28px;
      height: 28px;
      background: radial-gradient(circle, #ff0000, #ff5555);
      border-radius: 50%;
      position: absolute;
      top: 101px;
      left: 101px;
      transform: translate(0,0);
      transition: transform 0.05s linear;
      box-shadow: 0 0 12px #ff0000, 0 0 20px #ff4444aa inset;
    }

    /* ======================= المشغلات L1,L2,R1,R2 ======================= */
    #triggers {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    .trigger {
      width: 90px;
      height: 35px;
      border-radius: 8px;
      background: #333;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #fff;
      box-shadow: inset 0 0 10px rgba(0,255,255,0.2), 0 5px 15px rgba(0,0,0,0.7);
      font-size: 15px;
      perspective: 500px;
      transition: transform 0.1s;
    }

    .trigger-fill {
      height: 100%;
      background: linear-gradient(90deg, #00ffff, #00ffaa);
      width: 0%;
      border-radius: 8px;
      position: absolute;
      top: 0;
      left: 0;
      transition: width 0.05s linear;
      z-index: -1;
      box-shadow: 0 0 15px #00ffff, 0 0 30px #00ffaa inset;
    }

    /* ======================= زر الاهتزاز + الإضافات ======================= */
    #controls {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    button.control-btn {
      padding: 14px 30px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg,#0066ff,#00aaff);
      color: #fff;
      box-shadow: 0 6px 12px rgba(0,0,0,0.6);
      transition: 0.2s all;
    }

    button.control-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #00aaff, 0 0 40px #00ffff;
    }

    /* ======================= معايرة الانحراف ======================= */
    #calibration {
      font-size: 16px;
      text-align: center;
      color: #ffcc00;
      text-shadow: 0 0 8px #ffcc00;
      margin-bottom: 25px;
    }

    /* ======================= Dashboard وهمي ======================= */
    #dashboard {
      width: 100%;
      max-width: 950px;
      background: #111;
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 0 30px rgba(0,255,255,0.3);
      margin-bottom: 40px;
      transform-style: preserve-3d;
      animation: dashGlow 3s infinite alternate;
    }

    @keyframes dashGlow {
      0% { box-shadow: 0 0 30px rgba(0,255,255,0.2); }
      100% { box-shadow: 0 0 60px rgba(0,255,255,0.5); }
    }

    #dashboard h2 {
      color: #00ffff;
      margin-bottom: 18px;
      font-size: 24px;
      text-shadow: 0 0 8px #00ffff;
    }

    .dash-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .dash-label { color: #fff; }
    .dash-value { color: #00ffcc; font-weight: bold; text-shadow: 0 0 5px #00ffcc; }

  </style>
</head>
